<body>
    <div class="bg-glow"></div>
    <div class="bg-glow2"></div>
    <div class="container">
        <header>
            <div class="logo-unipaz">UNIPAZ · Seminario de Actualización 2026</div>
            <h1>🧠 Quiz: Evolución del Mantenimiento Industrial</h1>
            <p>Sesión 1.1 · Módulo 1 · Evaluación de apropiación del conocimiento</p>
        </header>

        <div id="reg-section">
            <div class="reg-card">
                <h2>📝 Registro del Estudiante</h2>
                <p>Completa tus datos antes de iniciar el quiz</p>
                <div class="form-group"><label>Nombre Completo</label><input type="text" id="reg-nombre"
                        placeholder="Ej: Juan Pérez García"></div>
                <div class="form-group"><label>Número de Cédula</label><input type="text" id="reg-cedula"
                        placeholder="Ej: 1098765432" inputmode="numeric"></div>
                <div class="form-group"><label>Programa Académico</label>
                    <select id="reg-programa">
                        <option value="">Seleccione su programa...</option>
                        <option value="Ingeniería Electromecánica">Ingeniería Electromecánica</option>
                        <option value="Ingeniería de Producción">Ingeniería de Producción</option>
                        <option value="Tecnología en SST">Tecnología en SST</option>
                        <option value="Ingeniería Agroindustrial">Ingeniería Agroindustrial</option>
                        <option value="Ingeniería Ambiental">Ingeniería Ambiental</option>
                        <option value="Profesional Externo">Profesional Externo</option>
                    </select>
                </div>
                <div id="reg-error" class="form-error"></div>
                <button class="btn-start" onclick="startQuiz()">🚀 Iniciar Quiz</button>
            </div>
        </div>

        <div id="quiz-section" style="display:none">
            <div class="progress-bar">
                <div class="progress-fill" id="progress" style="width:0%"></div>
            </div>
            <div class="stats">
                <div class="stat">
                    <div class="stat-val" id="s-current">1</div>
                    <div class="stat-label">Pregunta</div>
                </div>
                <div class="stat">
                    <div class="stat-val" id="s-total">20</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat">
                    <div class="stat-val" id="s-correct">0</div>
                    <div class="stat-label">Correctas</div>
                </div>
                <div class="stat">
                    <div class="stat-val" id="s-time">0:00</div>
                    <div class="stat-label">Tiempo</div>
                </div>
            </div>
            <div id="quiz-area"></div>
        </div>
    </div>

    <script>
        var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzpmN-WKymCd00-TY7m9njIGAj88cUgbz4qoXqq7OAQm3Z79uEgW5knPnA3RbhtQ9yGxw/exec';
        var student = {};
        var questions = [
            {
                q: "¿Cuál es la definición correcta de mantenimiento según la norma EN 13306?",
                ctx: "La norma EN 13306 establece la terminología oficial del mantenimiento.",
                opts: ["Conjunto de actividades para reparar equipos dañados", "Combinación de todas las acciones técnicas, administrativas y de gestión durante el ciclo de vida de un elemento, para conservarlo o devolverlo a un estado funcional", "Programa de cambio de piezas a intervalos regulares", "Actividades de limpieza, lubricación y ajuste de maquinaria"],
                ans: 1, exp: "La definición incluye acciones técnicas, administrativas Y de gestión. No es solo reparar; abarca todo el ciclo de vida del activo."
            },

            { q: "¿Qué es la «función requerida» de un equipo?", ctx: "Concepto fundamental que determina cuándo un equipo está en falla.", opts: ["La capacidad máxima del equipo según el fabricante", "La función principal y las funciones secundarias necesarias para proporcionar un servicio dado", "Solo la función de producción del equipo", "La función que el operador considera necesaria"], ans: 1, exp: "La función requerida incluye la función principal (ej: bombear crudo) y las secundarias (contener fluido, operar sin vibración excesiva, no generar riesgos)." },

            { q: "¿Cuándo ocurre una «falla» (avería)?", ctx: "El concepto de falla es central para toda la ingeniería de confiabilidad.", opts: ["Cuando el equipo se detiene completamente", "Cuando el equipo deja de cumplir CUALQUIERA de sus funciones requeridas", "Cuando el equipo necesita reparación mayor", "Cuando el equipo supera su vida útil de diseño"], ans: 1, exp: "Una falla ocurre cuando el equipo deja de cumplir cualquiera de sus funciones requeridas, no solo la principal." },

            { q: "¿Cuál es la diferencia entre falla potencial y falla funcional?", ctx: "Concepto del RCM para definir el intervalo P-F.", opts: ["La falla potencial es menos grave que la funcional", "La falla potencial es una condición detectable que indica que la falla funcional está por ocurrir; la funcional es la pérdida total de la función", "La falla potencial es teórica y la funcional es real", "No hay diferencia, son sinónimos"], ans: 1, exp: "La falla potencial es la señal de advertencia. La funcional es cuando ya dejó de cumplir su función. El tiempo entre ambas es el intervalo P-F." },

            { q: "¿Cuáles son los 4 tipos fundamentales de mantenimiento?", ctx: "Clasificación universalmente utilizada en la industria.", opts: ["Mecánico, eléctrico, instrumentación y civil", "Correctivo, Preventivo, Predictivo y Proactivo", "Reactivo, autónomo, periódico y productivo", "Primario, secundario, terciario y cuaternario"], ans: 1, exp: "Los 4 tipos son: CORRECTIVO (después de la falla), PREVENTIVO (programado a intervalos fijos), PREDICTIVO (basado en monitoreo de condición) y PROACTIVO (eliminar causas raíz)." },

            { q: "¿Qué caracteriza al mantenimiento preventivo?", ctx: "Uno de los 4 tipos fundamentales de mantenimiento.", opts: ["Se realiza cuando se detecta una falla", "Se realiza a intervalos fijos de tiempo o uso, independientemente de la condición del equipo", "Se programa según el monitoreo de la condición del equipo", "Busca mejorar la fiabilidad del equipo"], ans: 1, exp: "El preventivo se basa en calendario o uso (cada X horas, cada X meses), sin verificar si el equipo realmente lo necesita en ese momento." },

            { q: "¿Qué diferencia al mantenimiento predictivo del preventivo?", ctx: "Ambos buscan actuar antes de la falla, pero con enfoque diferente.", opts: ["Son exactamente lo mismo, solo cambia el nombre", "El predictivo monitorea la condición real del equipo y predice cuándo fallará; el preventivo usa intervalos fijos", "El predictivo es más barato que el preventivo", "El preventivo es más avanzado que el predictivo"], ans: 1, exp: "Preventivo: cambio cada X horas (sin importar estado). Predictivo: monitoreo de vibración, temperatura, aceite para saber cuándo realmente necesita intervención." },

            { q: "¿Qué es el mantenimiento proactivo?", ctx: "Es el tipo de mantenimiento más avanzado.", opts: ["Mantenimiento que corrige defectos de fabricación", "Mantenimiento enfocado en eliminar las causas raíz de las fallas y mejorar el diseño, la fiabilidad y la mantenibilidad del equipo", "Mantenimiento que aumenta la capacidad de producción del equipo", "Mantenimiento que actualiza el software de control"], ans: 1, exp: "El proactivo va a la raíz del problema: ¿por qué falla? ¿Cómo mejoramos el diseño para que no vuelva a fallar?" },

            { q: "¿Cuál de estas NO es una tarea de mantenimiento?", ctx: "La norma EN 13306 define qué actividades constituyen mantenimiento.", opts: ["Inspección", "Monitoreo de condición", "Diseño de nuevos productos", "Diagnóstico de averías"], ans: 2, exp: "El diseño de nuevos productos no es mantenimiento. Inspección, monitoreo, reparación y diagnóstico SÍ lo son." },

            { q: "¿Qué descubrieron Nolan y Heap en su estudio de 1978?", ctx: "Estudio realizado para la FAA con datos de United Airlines.", opts: ["Que todos los equipos fallan por desgaste con el tiempo", "Que solo el 11% de las fallas siguen un patrón de desgaste predecible; el 89% son aleatorias", "Que el mantenimiento preventivo elimina todas las fallas", "Que los aviones no necesitan mantenimiento frecuente"], ans: 1, exp: "Si el 89% de las fallas son aleatorias, cambiar piezas por calendario (preventivo) solo funciona para el 11% de los modos de falla. Por eso nace el predictivo." },

            { q: "¿Cuál es el patrón de falla más común según Nolan y Heap (68%)?", ctx: "Identificaron 6 patrones de falla diferentes.", opts: ["Curva de la bañera (mortalidad infantil + desgaste)", "Desgaste constante seguido de falla súbita", "Mortalidad infantil seguida de una probabilidad constante (meseta)", "Probabilidad de falla constante durante toda la vida"], ans: 2, exp: "El Patrón F (68%) muestra alta probabilidad de falla al ser NUEVO y luego se estabiliza. Esto justifica el mantenimiento predictivo sobre el preventivo en muchos casos." },

            { q: "¿Cuál es la filosofía de la 1ª generación del mantenimiento (antes de 1950)?", ctx: "Período de mantenimiento más básico.", opts: ["Prevenir con intervalos fijos", "Reparar cuando falle (solo correctivo)", "Monitorear la condición del equipo", "Predecir con inteligencia artificial"], ans: 1, exp: "La 1ª generación se basaba únicamente en «reparar cuando falle» — solo mantenimiento correctivo." },

            { q: "¿Qué metodología nació en la 3ª generación del mantenimiento (1975-2000)?", ctx: "Esta generación fue la respuesta al descubrimiento de Nolan y Heap.", opts: ["TPM y overhauls programados exclusivamente", "RCM (Mantenimiento Centrado en Confiabilidad) y monitoreo de condición", "Inteligencia Artificial y Gemelos Digitales", "Solo mantenimiento preventivo basado en tiempo"], ans: 1, exp: "La 3ª generación trajo el RCM de Moubray, el TPM de Nakajima, el FMEA, y las técnicas de mantenimiento predictivo." },

            { q: "¿Qué significan las siglas OEE?", ctx: "Indicador clave del TPM (Mantenimiento Productivo Total).", opts: ["Overall Equipment Effectiveness (Efectividad Global del Equipo)", "Operational Engineering Evaluation", "Optimized Energy Efficiency", "Output Equipment Estimation"], ans: 0, exp: "OEE = Disponibilidad × Rendimiento × Calidad. El benchmark de clase mundial es ≥ 85%." },

            { q: "¿Qué norma internacional establece los requisitos para la gestión de activos?", ctx: "Marco que integra el mantenimiento con la estrategia organizacional.", opts: ["ISO 9001", "ISO 14001", "ISO 55001", "ISO 45001"], ans: 2, exp: "ISO 55001 establece los requisitos del sistema de gestión de activos, integrando el mantenimiento con la estrategia del negocio." },

            { q: "¿Cuántas veces más costosa es una parada no programada comparada con una programada?", ctx: "Dato fundamental para justificar la inversión en mantenimiento preventivo y predictivo.", opts: ["2 veces más", "5 veces más", "Hasta 10 veces más", "No hay diferencia significativa"], ans: 2, exp: "Una parada no programada cuesta hasta 10 veces más: pérdida de producción + daño secundario + repuestos urgentes + mano de obra extra." },

            { q: "¿Qué accidente industrial de 1988 fue causado por una falla en la comunicación del mantenimiento?", ctx: "Tragedia que cambió la regulación de seguridad offshore.", opts: ["Bhopal, India", "Chernóbil, Ucrania", "Piper Alpha, Mar del Norte", "Texas City, Estados Unidos"], ans: 2, exp: "Piper Alpha (1988): 167 muertos. Un mantenimiento a una válvula de alivio no fue comunicado al turno entrante, causando la explosión." },

            { q: "¿Cuál de estos es un ejemplo de mantenimiento PREDICTIVO?", ctx: "El predictivo se basa en monitorear la condición real del equipo.", opts: ["Cambiar filtros cada 3 meses según calendario", "Reparar un motor que se quemó", "Analizar vibraciones de un rodamiento para detectar desgaste incipiente", "Rediseñar una guarda de seguridad para facilitar la inspección"], ans: 2, exp: "El análisis de vibraciones monitorea la condición real del equipo. Cambiar filtros cada 3 meses es preventivo, reparar el motor es correctivo, rediseñar la guarda es proactivo." },

            { q: "¿Qué técnica de mantenimiento predictivo es la más utilizada en equipos rotativos?", ctx: "Las técnicas predictivas son fundamentales en la industria moderna.", opts: ["Termografía infrarroja", "Análisis de aceites", "Análisis de vibraciones mecánicas", "Ultrasonido industrial"], ans: 2, exp: "El análisis de vibraciones es la técnica reina del mantenimiento predictivo para equipos rotativos (motores, bombas, ventiladores, turbinas)." },

            { q: "¿Qué diferencia al mantenimiento prescriptivo del predictivo en la 4ª generación?", ctx: "La 4ª generación integra IIoT, IA y Big Data.", opts: ["El prescriptivo es más barato que el predictivo", "El prescriptivo no solo predice cuándo fallará, sino que recomienda QUÉ HACER para evitarlo", "El prescriptivo solo funciona con sensores", "No hay diferencia, son sinónimos"], ans: 1, exp: "El predictivo dice cuándo fallará. El prescriptivo dice cuándo fallará Y recomienda qué acción tomar, cuánto cuesta cada opción y qué riesgo hay si no se actúa." }
        ];

        var current = 0, correct = 0, answered = false, timer = 0, timerInterval;

        function startQuiz() {
            var n = document.getElementById('reg-nombre').value.trim(), c = document.getElementById('reg-cedula').value.trim(), p = document.getElementById('reg-programa').value, err = document.getElementById('reg-error');
            if (!n || !c || !p) { err.textContent = '⚠️ Todos los campos son obligatorios'; err.style.display = 'block'; return }
            if (c.length < 5) { err.textContent = '⚠️ Ingresa un número de cédula válido'; err.style.display = 'block'; return }
            student = { nombre: n, cedula: c, programa: p };
            document.getElementById('reg-section').style.display = 'none'; document.getElementById('quiz-section').style.display = 'block';
            timerInterval = setInterval(function () { timer++; var m = Math.floor(timer / 60), s = timer % 60; document.getElementById('s-time').textContent = m + ':' + (s < 10 ? '0' : '') + s }, 1000);
            showQuestion();
        }

        function showQuestion() {
            if (current >= questions.length) { showResults(); return }
            answered = false; var q = questions[current];
            document.getElementById('s-current').textContent = current + 1;
            document.getElementById('progress').style.width = ((current) / questions.length * 100) + '%';
            var html = '<div class="question-card"><div class="q-number">PREGUNTA ' + (current + 1) + ' DE ' + questions.length + '</div><div class="q-text">' + q.q + '</div>';
            if (q.ctx) html += '<div class="q-context">💡 ' + q.ctx + '</div>';
            html += '<div class="options">';
            for (var i = 0; i < q.opts.length; i++) { html += '<div class="option" data-idx="' + i + '" onclick="selectOption(this,' + i + ')"><div class="option-letter">' + String.fromCharCode(65 + i) + '</div><div>' + q.opts[i] + '</div></div>' }
            html += '</div><div class="feedback" id="feedback"></div><button class="btn-next" id="btnNext" onclick="nextQ()">Siguiente →</button></div>';
            document.getElementById('quiz-area').innerHTML = html;
        }

        function selectOption(el, idx) {
            if (answered) return; answered = true; var q = questions[current], fb = document.getElementById('feedback'), opts = document.querySelectorAll('.option');
            for (var i = 0; i < opts.length; i++) { var oi = parseInt(opts[i].getAttribute('data-idx')); if (oi === q.ans) opts[i].className = 'option correct'; if (oi === idx && idx !== q.ans) opts[i].className = 'option wrong' }
            if (idx === q.ans) { correct++; document.getElementById('s-correct').textContent = correct; fb.className = 'feedback correct show'; fb.innerHTML = '<h4>✅ ¡Correcto!</h4>' + q.exp }
            else { fb.className = 'feedback wrong show'; fb.innerHTML = '<h4>❌ Incorrecto</h4>' + q.exp; questions[current].missed = true }
            document.getElementById('btnNext').className = 'btn-next show';
        }

        function nextQ() { current++; showQuestion() }

        function sendResults(pct, timeStr) {
            var data = { nombre: student.nombre, cedula: student.cedula, programa: student.programa, actividad: 'Quiz - Evolución del Mantenimiento', puntaje: correct, total: questions.length, porcentaje: pct + '%', tiempo: timeStr };
            var x = new XMLHttpRequest(); x.open('POST', APPS_SCRIPT_URL, true); x.setRequestHeader('Content-Type', 'text/plain');
            x.onload = function () { var m = document.getElementById('sent-msg'); if (m) { m.className = 'sent-msg ok'; m.textContent = '✅ Resultados guardados exitosamente' } };
            x.onerror = function () { var m = document.getElementById('sent-msg'); if (m) { m.className = 'sent-msg ok'; m.textContent = '✅ Resultados enviados' } };
            x.send(JSON.stringify(data));
        }

        function showResults() {
            clearInterval(timerInterval); document.getElementById('progress').style.width = '100%';
            var pct = Math.round(correct / questions.length * 100), m = Math.floor(timer / 60), s = timer % 60, timeStr = m + ':' + (s < 10 ? '0' : '') + s;
            var msg = '', color = '';
            if (pct >= 90) { msg = '🏆 ¡Excelente! Dominas los conceptos fundamentales.'; color = '#22c55e' }
            else if (pct >= 70) { msg = '👏 ¡Muy bien! Buena comprensión con algunos puntos a reforzar.'; color = '#60a5fa' }
            else if (pct >= 50) { msg = '📚 Aceptable. Se recomienda revisar los temas marcados.'; color = '#f59e0b' }
            else { msg = '⚠️ Necesita refuerzo. Revisa las notas de la sesión 1.1.'; color = '#ef4444' }
            var html = '<div class="question-card results"><h2 style="color:' + color + '">Resultados del Quiz</h2>';
            html += '<p style="color:#94a3b8;font-size:.85rem;margin-bottom:4px">' + student.nombre + ' (' + student.programa + ')</p>';
            html += '<div class="score-inner"><div class="score-num">' + correct + '/' + questions.length + '</div><div class="score-of">' + pct + '%</div></div>';
            html += '<p class="result-msg">' + msg + '</p><p style="color:#64748b;font-size:.8rem;margin-bottom:16px">Tiempo: ' + timeStr + '</p>';
            html += '<div id="sent-msg" class="sent-msg"></div>';
            html += '<a href="index.html" class="btn-home">← Volver al menú</a>';
            html += '<div class="review-section"><h3>Revisión de respuestas</h3>';
            for (var i = 0; i < questions.length; i++) { var q = questions[i]; html += '<div class="review-item ' + (q.missed ? 'missed' : '') + '"><div class="ri-q">' + (i + 1) + '. ' + q.q + '</div><div class="ri-a">' + (q.missed ? '<span>✗ Incorrecta</span>' : '<span>✓ Correcta</span>') + ' — ' + q.opts[q.ans] + '</div></div>' }
            html += '</div></div>';
            document.getElementById('quiz-area').innerHTML = html;
            sendResults(pct, timeStr);
            setTimeout(function () { var el = document.getElementById('sent-msg'); if (el) el.style.display = 'block' }, 1500);
        }
    </script>
</body>

</html>
