<body>
    <div class="bg-glow"></div>
    <div class="bg-glow2"></div>
    <div class="container">
        <header>
            <div class="logo-unipaz">UNIPAZ · Seminario de Actualización 2026</div>
            <h1>🧠 Quiz: Evolución del Mantenimiento Industrial</h1>
            <p>Sesión 1.1 · Módulo 1 · Evaluación de apropiación del conocimiento</p>
        </header>

        <!-- REGISTRATION -->
        <div id="reg-section">
            <div class="reg-card">
                <h2>📝 Registro del Estudiante</h2>
                <p>Completa tus datos antes de iniciar el quiz</p>
                <div class="form-group"><label>Nombre Completo</label><input type="text" id="reg-nombre"
                        placeholder="Ej: Juan Pérez García"></div>
                <div class="form-group"><label>Número de Cédula</label><input type="text" id="reg-cedula"
                        placeholder="Ej: 1098765432" inputmode="numeric"></div>
                <div class="form-group"><label>Programa Académico</label>
                    <select id="reg-programa">
                        <option value="">Seleccione su programa...</option>
                        <option value="Ingeniería Electromecánica">Ingeniería Electromecánica</option>
                        <option value="Ingeniería de Producción">Ingeniería de Producción</option>
                        <option value="Tecnología en SST">Tecnología en SST</option>
                        <option value="Ingeniería Agroindustrial">Ingeniería Agroindustrial</option>
                        <option value="Ingeniería Ambiental">Ingeniería Ambiental</option>
                        <option value="Profesional Externo">Profesional Externo</option>
                    </select>
                </div>
                <div id="reg-error" class="form-error"></div>
                <button class="btn-start" onclick="startQuiz()">🚀 Iniciar Quiz</button>
            </div>
        </div>

        <!-- QUIZ -->
        <div id="quiz-section" style="display:none">
            <div class="progress-bar">
                <div class="progress-fill" id="progress" style="width:0%"></div>
            </div>
            <div class="stats">
                <div class="stat">
                    <div class="stat-val" id="s-current">1</div>
                    <div class="stat-label">Pregunta</div>
                </div>
                <div class="stat">
                    <div class="stat-val" id="s-total">20</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat">
                    <div class="stat-val" id="s-correct">0</div>
                    <div class="stat-label">Correctas</div>
                </div>
                <div class="stat">
                    <div class="stat-val" id="s-time">0:00</div>
                    <div class="stat-label">Tiempo</div>
                </div>
            </div>
            <div id="quiz-area"></div>
        </div>
    </div>

    <script>
        var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzpmN-WKymCd00-TY7m9njIGAj88cUgbz4qoXqq7OAQm3Z79uEgW5knPnA3RbhtQ9yGxw/exec';
        var student = {};

        var questions = [
            {
                q: "Según la norma EN 13306:2017, ¿cuál es la definición correcta de mantenimiento?",
                ctx: "La norma EN 13306 establece la terminología oficial del mantenimiento a nivel internacional.",
                opts: ["Conjunto de actividades para reparar equipos dañados", "Combinación de todas las acciones técnicas, administrativas y de gestión durante el ciclo de vida de un elemento, para conservarlo o devolverlo a un estado funcional", "Programa de cambio de piezas a intervalos regulares de tiempo", "Actividades de limpieza, lubricación y ajuste de maquinaria"],
                ans: 1, exp: "La definición incluye acciones técnicas, administrativas Y de gestión. No es solo reparar; abarca todo el ciclo de vida del activo y busca que cumpla su función requerida."
            },
            { q: "¿Qué es la «función requerida» de un equipo según EN 13306?", ctx: "Concepto fundamental que determina cuándo un equipo está en falla.", opts: ["La capacidad máxima del equipo según el fabricante", "La función principal y las funciones secundarias necesarias para proporcionar un servicio dado", "Solo la función de producción del equipo", "La función que el operador considera necesaria"], ans: 1, exp: "La función requerida incluye tanto la función principal (ej: bombear crudo) como las secundarias (contener fluido, operar sin vibración excesiva, no generar riesgos de seguridad)." },
            { q: "Según la EN 13306, ¿cuándo ocurre una «falla» (avería)?", ctx: "El concepto de falla es central para toda la ingeniería de confiabilidad.", opts: ["Cuando el equipo se detiene completamente", "Cuando el equipo deja de cumplir CUALQUIERA de sus funciones requeridas", "Cuando el equipo necesita reparación mayor", "Cuando el equipo supera su vida útil de diseño"], ans: 1, exp: "Una falla ocurre cuando el equipo deja de cumplir cualquiera de sus funciones requeridas, no solo la principal." },
            { q: "¿Cuál es la diferencia entre falla potencial y falla funcional?", ctx: "Concepto introducido por el RCM para definir el intervalo P-F.", opts: ["La falla potencial es menos grave que la funcional", "La falla potencial es una condición detectable que indica que la falla funcional está por ocurrir; la funcional es la pérdida total de la función", "La falla potencial es teórica y la funcional es real", "No hay diferencia, son sinónimos"], ans: 1, exp: "La falla potencial es la señal de advertencia. La funcional es cuando ya dejó de cumplir su función. El tiempo entre ambas es el intervalo P-F." },
            { q: "Según la taxonomía de la EN 13306, ¿cuáles son las tres grandes ramas del mantenimiento?", ctx: "La norma clasifica el mantenimiento en un árbol jerárquico.", opts: ["Mecánico, eléctrico e instrumentación", "Correctivo, preventivo y mejorativo", "Reactivo, proactivo y autónomo", "Primario, secundario y terciario"], ans: 1, exp: "La EN 13306 clasifica: CORRECTIVO (después de la falla), PREVENTIVO (antes de la falla), y MEJORATIVO (para mejorar fiabilidad, mantenibilidad o seguridad)." },
            { q: "¿Qué es el mantenimiento predeterminado según EN 13306?", ctx: "Es un subtipo del mantenimiento preventivo.", opts: ["Mantenimiento que se realiza cuando se detecta una falla", "Mantenimiento preventivo realizado a intervalos fijos de tiempo o uso, sin investigación previa del estado del elemento", "Mantenimiento que se programa según la condición del equipo", "Mantenimiento que mejora la fiabilidad del equipo"], ans: 1, exp: "El predeterminado se basa en calendario o uso (cada X horas, cada X meses), sin verificar si el equipo realmente lo necesita." },
            { q: "¿Qué diferencia al mantenimiento predictivo del basado en condición?", ctx: "Ambos son subtipos del preventivo, pero hay una diferencia clave.", opts: ["Son exactamente lo mismo, solo cambia el nombre", "El predictivo añade la dimensión temporal: estima CUÁNDO ocurrirá la falla basándose en tendencias de degradación", "El predictivo usa sensores y el basado en condición usa inspección visual", "El basado en condición es más avanzado que el predictivo"], ans: 1, exp: "Basado en condición: detecta el estado actual. Predictivo: estima cuándo fallará basándose en tendencias." },
            { q: "¿Qué es el mantenimiento mejorativo?", ctx: "Es la tercera rama principal según EN 13306.", opts: ["Mantenimiento que corrige defectos de fabricación", "Mantenimiento cuyo objetivo es mejorar la fiabilidad, mantenibilidad o seguridad sin cambiar la función requerida", "Mantenimiento que aumenta la capacidad de producción del equipo", "Mantenimiento que actualiza el software de control"], ans: 1, exp: "El mejorativo busca que el equipo sea MEJOR: que falle menos, sea más fácil de reparar o más seguro." },
            { q: "Según la EN 13306, ¿cuál de estas NO es una tarea de mantenimiento?", ctx: "La norma define las actividades que constituyen mantenimiento.", opts: ["Inspección", "Monitoreo", "Diseño de nuevos productos", "Diagnóstico de averías"], ans: 2, exp: "El diseño de nuevos productos no es mantenimiento. Inspección, monitoreo, reparación, diagnóstico SÍ son tareas de mantenimiento." },
            { q: "¿Qué descubrieron Nolan y Heap en su estudio de 1978?", ctx: "Estudio realizado para la FAA con datos de United Airlines.", opts: ["Que todos los equipos fallan por desgaste con el tiempo", "Que solo el 11% de las fallas siguen un patrón de desgaste predecible; el 89% son aleatorias", "Que el mantenimiento preventivo elimina todas las fallas", "Que los aviones no necesitan mantenimiento frecuente"], ans: 1, exp: "Si el 89% de las fallas son aleatorias, cambiar piezas por calendario solo funciona para el 11% de los modos de falla." },
            { q: "¿Cuál es el patrón de falla más común según Nolan y Heap (68%)?", ctx: "Identificaron 6 patrones de falla diferentes.", opts: ["Curva de la bañera (mortalidad infantil + desgaste)", "Desgaste constante seguido de falla súbita", "Mortalidad infantil seguida de una probabilidad constante (meseta)", "Probabilidad de falla constante durante toda la vida"], ans: 2, exp: "El Patrón F (68%) muestra alta probabilidad de falla al ser NUEVO y luego se estabiliza." },
            { q: "¿Cuál es la filosofía de la 1ª generación del mantenimiento?", ctx: "Período anterior a 1950.", opts: ["Prevenir con intervalos fijos", "Reparar cuando falle", "Monitorear la condición del equipo", "Predecir con inteligencia artificial"], ans: 1, exp: "La 1ª generación (antes de 1950) se basaba en «reparar cuando falle»." },
            { q: "¿Qué metodología nació en la 3ª generación del mantenimiento (1975-2000)?", ctx: "Esta generación fue la respuesta al descubrimiento de Nolan y Heap.", opts: ["TPM y overhauls programados", "RCM (Mantenimiento Centrado en Confiabilidad) y monitoreo de condición", "Inteligencia Artificial y Gemelos Digitales", "Mantenimiento preventivo basado en tiempo"], ans: 1, exp: "La 3ª generación trajo el RCM de Moubray, el TPM de Nakajima, el FMEA, y las técnicas de monitoreo de condición." },
            { q: "¿Qué significan las siglas OEE?", ctx: "Indicador clave del TPM (Mantenimiento Productivo Total).", opts: ["Overall Equipment Effectiveness (Efectividad Global del Equipo)", "Operational Engineering Evaluation", "Optimized Energy Efficiency", "Output Equipment Estimation"], ans: 0, exp: "OEE = Disponibilidad × Rendimiento × Calidad. El benchmark de clase mundial es ≥ 85%." },
            { q: "¿Qué norma internacional establece los requisitos para la gestión de activos?", ctx: "Marco que integra el mantenimiento con la estrategia organizacional.", opts: ["ISO 9001", "ISO 14001", "ISO 55001", "ISO 45001"], ans: 2, exp: "ISO 55001 establece los requisitos del sistema de gestión de activos." },
            { q: "¿Cuántas veces más costosa es una parada no programada comparada con una programada?", ctx: "Dato fundamental para justificar la inversión en mantenimiento preventivo.", opts: ["2 veces más", "5 veces más", "Hasta 10 veces más", "No hay diferencia significativa"], ans: 2, exp: "Una parada no programada cuesta hasta 10 veces más que una programada equivalente." },
            { q: "¿Qué accidente industrial de 1988 fue causado por una falla en la comunicación del mantenimiento?", ctx: "Tragedia que cambió la regulación de seguridad offshore.", opts: ["Bhopal, India", "Chernóbil, Ucrania", "Piper Alpha, Mar del Norte", "Texas City, Estados Unidos"], ans: 2, exp: "Piper Alpha (1988): 167 muertos. Un mantenimiento a una válvula de alivio no fue comunicado al turno entrante." },
            { q: "¿Qué porcentaje de las actividades de mantenimiento preventivo son innecesarias según Moubray?", ctx: "John Moubray es el autor de RCM II.", opts: ["10%", "20%", "30%", "50%"], ans: 2, exp: "Moubray estimó que el 30% de las actividades de mantenimiento preventivo que se realizan son innecesarias." },
            { q: "¿Qué técnica de monitoreo de condición es la más utilizada en equipos rotativos?", ctx: "Las técnicas predictivas son fundamentales en la 3ª y 4ª generación.", opts: ["Termografía infrarroja", "Análisis de aceites", "Análisis de vibraciones mecánicas", "Ultrasonido industrial"], ans: 2, exp: "El análisis de vibraciones es la técnica reina del mantenimiento predictivo para equipos rotativos." },
            { q: "¿Qué diferencia al mantenimiento prescriptivo del predictivo?", ctx: "La 4ª generación integra IIoT, IA y Big Data.", opts: ["El prescriptivo es más barato que el predictivo", "El prescriptivo no solo predice cuándo fallará, sino que recomienda QUÉ HACER para evitarlo", "El prescriptivo solo funciona con sensores", "No hay diferencia, son sinónimos"], ans: 1, exp: "El predictivo dice cuándo fallará. El prescriptivo dice cuándo fallará Y recomienda qué hacer, cuánto cuesta y qué riesgo hay si no se actúa." }
        ];

        var current = 0, correct = 0, answered = false, timer = 0, timerInterval;

        function startQuiz() {
            var n = document.getElementById('reg-nombre').value.trim();
            var c = document.getElementById('reg-cedula').value.trim();
            var p = document.getElementById('reg-programa').value;
            var err = document.getElementById('reg-error');
            if (!n || !c || !p) { err.textContent = '⚠️ Todos los campos son obligatorios'; err.style.display = 'block'; return }
            if (c.length < 5) { err.textContent = '⚠️ Ingresa un número de cédula válido'; err.style.display = 'block'; return }
            student = { nombre: n, cedula: c, programa: p };
            document.getElementById('reg-section').style.display = 'none';
            document.getElementById('quiz-section').style.display = 'block';
            timerInterval = setInterval(function () { timer++; var m = Math.floor(timer / 60), s = timer % 60; document.getElementById('s-time').textContent = m + ':' + (s < 10 ? '0' : '') + s }, 1000);
            showQuestion();
        }

        function showQuestion() {
            if (current >= questions.length) { showResults(); return }
            answered = false;
            var q = questions[current];
            document.getElementById('s-current').textContent = current + 1;
            document.getElementById('progress').style.width = ((current) / questions.length * 100) + '%';
            var area = document.getElementById('quiz-area');
            var html = '<div class="question-card"><div class="q-number">PREGUNTA ' + (current + 1) + ' DE ' + questions.length + '</div><div class="q-text">' + q.q + '</div>';
            if (q.ctx) html += '<div class="q-context">💡 ' + q.ctx + '</div>';
            html += '<div class="options">';
            for (var i = 0; i < q.opts.length; i++) {
                html += '<div class="option" data-idx="' + i + '" onclick="selectOption(this,' + i + ')"><div class="option-letter">' + String.fromCharCode(65 + i) + '</div><div>' + q.opts[i] + '</div></div>';
            }
            html += '</div><div class="feedback" id="feedback"></div><button class="btn-next" id="btnNext" onclick="nextQ()">Siguiente →</button></div>';
            area.innerHTML = html;
        }

        function selectOption(el, idx) {
            if (answered) return; answered = true;
            var q = questions[current], fb = document.getElementById('feedback'), opts = document.querySelectorAll('.option');
            for (var i = 0; i < opts.length; i++) {
                var oi = parseInt(opts[i].getAttribute('data-idx'));
                if (oi === q.ans) opts[i].className = 'option correct';
                if (oi === idx && idx !== q.ans) opts[i].className = 'option wrong';
            }
            if (idx === q.ans) { correct++; document.getElementById('s-correct').textContent = correct; fb.className = 'feedback correct show'; fb.innerHTML = '<h4>✅ ¡Correcto!</h4>' + q.exp }
            else { fb.className = 'feedback wrong show'; fb.innerHTML = '<h4>❌ Incorrecto</h4>' + q.exp; questions[current].missed = true }
            document.getElementById('btnNext').className = 'btn-next show';
        }

        function nextQ() { current++; showQuestion() }

        function sendResults(pct, timeStr) {
            var data = { nombre: student.nombre, cedula: student.cedula, programa: student.programa, actividad: 'Quiz - Evolución del Mantenimiento', puntaje: correct, total: questions.length, porcentaje: pct + '%', tiempo: timeStr };
            var x = new XMLHttpRequest();
            x.open('POST', APPS_SCRIPT_URL, true);
            x.setRequestHeader('Content-Type', 'text/plain');
            x.onload = function () {
                var msg = document.getElementById('sent-msg');
                if (x.status === 200 || x.status === 302 || x.status === 0) { msg.className = 'sent-msg ok'; msg.textContent = '✅ Resultados guardados exitosamente' }
                else { msg.className = 'sent-msg err'; msg.textContent = '⚠️ No se pudieron guardar los resultados (error de red)' }
            };
            x.onerror = function () {/* Google redirects, but data is saved */
                var msg = document.getElementById('sent-msg'); msg.className = 'sent-msg ok'; msg.textContent = '✅ Resultados enviados'
            };
            x.send(JSON.stringify(data));
        }

        function showResults() {
            clearInterval(timerInterval);
            document.getElementById('progress').style.width = '100%';
            var pct = Math.round(correct / questions.length * 100);
            var m = Math.floor(timer / 60), s = timer % 60;
            var timeStr = m + ':' + (s < 10 ? '0' : '') + s;
            var msg = '', color = '';
            if (pct >= 90) { msg = '🏆 ¡Excelente! Dominas los conceptos fundamentales.'; color = '#22c55e' }
            else if (pct >= 70) { msg = '👏 ¡Muy bien! Buena comprensión con algunos puntos a reforzar.'; color = '#60a5fa' }
            else if (pct >= 50) { msg = '📚 Aceptable. Se recomienda revisar los temas marcados.'; color = '#f59e0b' }
            else { msg = '⚠️ Necesita refuerzo. Revisa las notas de la sesión 1.1.'; color = '#ef4444' }
            var area = document.getElementById('quiz-area');
            var html = '<div class="question-card results"><h2 style="color:' + color + '">Resultados del Quiz</h2>';
            html += '<p style="color:#94a3b8;font-size:.85rem;margin-bottom:4px">' + student.nombre + ' (' + student.programa + ')</p>';
            html += '<div class="score-circle"><div class="score-inner"><div class="score-num">' + correct + '/' + questions.length + '</div><div class="score-of">' + pct + '%</div></div></div>';
            html += '<p class="result-msg">' + msg + '</p>';
            html += '<p style="color:#64748b;font-size:.8rem;margin-bottom:16px">Tiempo: ' + timeStr + '</p>';
            html += '<div id="sent-msg" class="sent-msg" style="display:none"></div>';
            html += '<a href="index.html" class="btn-home" style="margin-top:16px;display:inline-block">← Volver al menú</a>';
            html += '<div class="review-section"><h3>Revisión de respuestas</h3>';
            for (var i = 0; i < questions.length; i++) {
                var q = questions[i];
                html += '<div class="review-item ' + (q.missed ? 'missed' : '') + '"><div class="ri-q">' + (i + 1) + '. ' + q.q + '</div><div class="ri-a">' + (q.missed ? '<span>✗ Incorrecta</span>' : '<span>✓ Correcta</span>') + ' — ' + q.opts[q.ans] + '</div></div>';
            }
            html += '</div></div>';
            area.innerHTML = html;
            sendResults(pct, timeStr);
            // Show sent message after slight delay
            setTimeout(function () { var el = document.getElementById('sent-msg'); if (el) el.style.display = 'block' }, 1500);
        }
    </script>
</body>
